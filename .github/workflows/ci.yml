name: Deploy to GitHub Pages

on:
  workflow_dispatch:

# 设置部署权限
permissions:
  contents: read          # 检出代码需要
  pages: write            # 部署到 Pages 需要
  id-token: write         # 使用 OIDC 认证（官方推荐）

# 只允许一个并发部署，避免部署冲突
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            host/node_modules
            shared/node_modules
            app1/node_modules
            app2/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('host/package-lock.json', 'shared/package-lock.json', 'app1/package-lock.json', 'app2/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: |
          npm ci --prefix host
          npm ci --prefix shared
          npm ci --prefix app1
          npm ci --prefix app2

      - name: Build all apps
        run: |
          npm run build --prefix host
          npm run build --prefix shared
          npm run build --prefix app1
          npm run build --prefix app2

      # 关键步骤：上传构建产物（./dist）作为 Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist   # 你的构建输出目录

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4